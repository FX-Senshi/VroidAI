<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>VRoid AI</title>
    <style>
      :root {
        --bg: #efe5d5;
        --panel: rgba(255, 250, 243, 0.92);
        --panel-strong: rgba(255, 251, 246, 0.96);
        --border: rgba(98, 67, 39, 0.14);
        --text: #2f241b;
        --muted: #6e5a4b;
        --accent: #b35f31;
        --accent-2: #8e4720;
        --shadow-soft: 0 18px 36px rgba(74, 50, 28, 0.08);
        --shadow-strong: 0 24px 48px rgba(47, 36, 27, 0.18);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: "Yu Gothic", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.78), transparent 36%),
          linear-gradient(180deg, #f7efe3 0%, var(--bg) 100%);
        overscroll-behavior-y: none;
      }
      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: minmax(54vh, 1fr) auto;
      }
      .viewer {
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(230,214,191,0.7));
      }
      .viewer::after {
        content: "";
        position: absolute;
        inset: auto 0 0 0;
        height: 24%;
        background: linear-gradient(180deg, transparent, rgba(128, 93, 58, 0.08));
        pointer-events: none;
      }
      #stage {
        width: 100%;
        height: 100%;
        min-height: 54vh;
      }
      .statusBar {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 2;
      }
      .status {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 251, 246, 0.94);
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.88rem;
        box-shadow: var(--shadow-soft);
      }
      .sidebar {
        display: grid;
        gap: 12px;
        padding: 12px;
      }
      .panel {
        padding: 14px;
        border-radius: 18px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-soft);
      }
      .controls {
        display: grid;
        gap: 10px;
      }
      .field {
        display: grid;
        gap: 6px;
      }
      .field label,
      .hint,
      .meta {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .field select,
      .composer textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 252, 247, 0.98);
        color: var(--text);
        font: inherit;
      }
      .chat {
        display: grid;
        gap: 12px;
      }
      .messages {
        min-height: 220px;
        max-height: 36vh;
        overflow: auto;
        display: grid;
        gap: 10px;
        padding-right: 4px;
        scroll-behavior: smooth;
      }
      .message {
        max-width: 92%;
        padding: 12px 14px;
        border-radius: 16px;
        line-height: 1.65;
        white-space: pre-wrap;
      }
      .message.user {
        margin-left: auto;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
      }
      .message.assistant {
        background: var(--panel-strong);
        border: 1px solid var(--border);
      }
      .composer {
        display: grid;
        gap: 10px;
      }
      .composer textarea {
        min-height: 96px;
        resize: vertical;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        align-items: center;
      }
      .sendButton {
        border: none;
        border-radius: 999px;
        min-width: 92px;
        padding: 12px 18px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 14px 24px rgba(179, 95, 49, 0.22);
      }
      .sendButton:disabled {
        opacity: 0.7;
        cursor: wait;
      }
      .mobileMenuButton,
      .mobileMenuBackdrop {
        display: none;
      }
      .mobileMenuButton {
        border: none;
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(255, 251, 246, 0.9);
        border: 1px solid var(--border);
        color: var(--text);
        font: inherit;
        cursor: pointer;
        box-shadow: var(--shadow-soft);
      }
      .mobileMenuButton[aria-expanded="true"] {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
      }
      .mobileMenuClose {
        display: none;
        border: none;
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(255, 252, 247, 0.98);
        border: 1px solid var(--border);
        color: var(--text);
        font: inherit;
        cursor: pointer;
      }
      @media (max-width: 979px) {
        body {
          overflow: hidden;
        }
        .app {
          min-height: 100svh;
          display: grid;
          grid-template-rows: minmax(36svh, 41svh) minmax(0, 1fr);
        }
        .viewer {
          position: relative;
          overflow: hidden;
          border-radius: 0 0 28px 28px;
        }
        #stage {
          min-height: 36svh;
        }
        .statusBar {
          top: 62px;
          right: 14px;
        }
        .mobileMenuButton {
          position: fixed;
          top: 14px;
          left: 14px;
          z-index: 4;
          display: inline-flex;
          align-items: center;
          gap: 8px;
          backdrop-filter: blur(8px);
        }
        .mobileMenuBackdrop {
          position: fixed;
          inset: 0;
          z-index: 4;
          background: rgba(47, 36, 27, 0.18);
          backdrop-filter: blur(4px);
        }
        body[data-mobile-menu="closed"] .mobileMenuBackdrop {
          display: none;
        }
        .sidebar {
          position: relative;
          padding: 0 12px 12px;
          display: block;
          margin-top: -14px;
          z-index: 3;
        }
        .controls {
          position: fixed;
          top: 68px;
          left: 14px;
          right: 14px;
          z-index: 5;
          display: grid;
          gap: 10px;
          max-height: calc(100svh - 88px);
          overflow: auto;
          border-radius: 22px;
          background: rgba(255, 249, 241, 0.96);
          box-shadow: var(--shadow-strong);
          opacity: 0;
          transform: translateY(-12px);
          pointer-events: none;
          transition: opacity 180ms ease, transform 180ms ease;
          backdrop-filter: blur(14px);
        }
        body[data-mobile-menu="open"] .controls {
          opacity: 1;
          transform: translateY(0);
          pointer-events: auto;
        }
        .controlsHeader {
          display: grid;
          grid-template-columns: 1fr auto;
          gap: 12px;
          align-items: center;
        }
        .mobileMenuClose {
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }
        .chat {
          min-height: 0;
          height: calc(64svh - 22px);
          display: grid;
          grid-template-rows: minmax(0, 1fr) auto;
          padding: 14px 14px 12px;
          border-radius: 24px;
          background:
            linear-gradient(180deg, rgba(255, 252, 247, 0.97), rgba(250, 244, 236, 0.94));
          border: 1px solid rgba(98, 67, 39, 0.12);
          box-shadow: 0 22px 48px rgba(74, 50, 28, 0.14);
        }
        .messages {
          min-height: 0;
          max-height: none;
          padding-top: 4px;
        }
        .composer {
          position: sticky;
          bottom: 0;
          padding-top: 10px;
          background: linear-gradient(180deg, rgba(250, 244, 236, 0), rgba(250, 244, 236, 0.96) 24%);
        }
        .composer textarea {
          min-height: 84px;
          padding: 14px 15px;
          border-radius: 18px;
        }
        .actions {
          align-items: flex-end;
        }
        .sendButton {
          min-width: 104px;
          padding: 13px 20px;
        }
      }
      @media (min-width: 980px) {
        .app {
          height: 100vh;
          min-height: 100vh;
          grid-template-columns: minmax(440px, 1.18fr) minmax(320px, 0.82fr);
          grid-template-rows: 1fr;
          gap: 16px;
          padding: 16px;
          overflow: hidden;
        }
        .viewer {
          border-radius: 24px;
          border: 1px solid var(--border);
        }
        #stage {
          min-height: calc(100vh - 32px);
        }
        .sidebar {
          min-height: 0;
          padding: 0;
          overflow: hidden;
          align-content: stretch;
          grid-template-rows: auto 1fr;
        }
        .chat {
          min-height: 0;
          height: 100%;
          display: grid;
          grid-template-rows: minmax(0, 1fr) auto;
          overflow: hidden;
        }
        .messages {
          min-height: 0;
          max-height: none;
          overflow: auto;
        }
        .composer {
          padding-top: 10px;
          background: linear-gradient(180deg, rgba(255, 250, 243, 0), rgba(255, 250, 243, 0.96) 24%);
        }
      }
    </style>
  </head>
  <body data-mobile-menu="closed">
    <button class="mobileMenuButton" id="mobileMenuButton" type="button" aria-expanded="false">メニュー</button>
    <div class="mobileMenuBackdrop" id="mobileMenuBackdrop" hidden></div>
    <main class="app">
      <section class="viewer">
        <div id="stage"></div>
      </section>
      <aside class="sidebar">
        <section class="panel controls">
          <div class="controlsHeader">
            <div class="meta">メニュー</div>
            <button class="mobileMenuClose" id="mobileMenuCloseButton" type="button">閉じる</button>
          </div>
        </section>
        <section class="panel chat">
          <div class="messages" id="messages"></div>
          <form class="composer" id="chatForm">
            <textarea id="chatInput" placeholder="メッセージを入力"></textarea>
            <div class="actions">
              <button class="sendButton" id="sendButton" type="submit">送信</button>
            </div>
          </form>
        </section>
      </aside>
    </main>
    <div hidden aria-hidden="true">
      <select id="modelSelect"></select>
    </div>
    <script type="module" src="./viewer.js?v=20260318o"></script>
  </body>
</html>
