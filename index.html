<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VRoid Mobile Web App</title>
    <style>
      :root {
        --bg: #efe5d5;
        --bg-2: #e6d6bf;
        --panel: rgba(255, 250, 243, 0.86);
        --border: rgba(98, 67, 39, 0.12);
        --text: #2f241b;
        --muted: #6e5a4b;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: "Yu Gothic", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.72), transparent 34%),
          linear-gradient(165deg, var(--bg) 0%, #f4ecdf 48%, var(--bg-2) 100%);
      }
      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: minmax(60vh, 1fr) auto;
      }
      .viewer {
        position: relative;
        overflow: hidden;
      }
      #stage {
        width: 100%;
        height: 100%;
        min-height: 60vh;
      }
      .hud {
        position: absolute;
        top: 14px;
        left: 14px;
        right: 14px;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .pill {
        padding: 9px 12px;
        border-radius: 999px;
        background: rgba(255, 251, 246, 0.92);
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.92rem;
      }
      .panel {
        margin: 0 14px 14px;
        padding: 18px;
        border-radius: 22px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 18px 40px rgba(60, 35, 16, 0.12);
        backdrop-filter: blur(16px);
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 8vw, 3rem);
        line-height: 1;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
      .tips {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }
      .tip {
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 251, 246, 0.92);
        border: 1px solid var(--border);
        color: var(--muted);
      }
      @media (min-width: 900px) {
        .app {
          grid-template-columns: minmax(480px, 1fr) 380px;
          grid-template-rows: 1fr;
          gap: 18px;
          padding: 18px;
        }
        .panel {
          margin: 0;
          align-self: stretch;
        }
        .viewer {
          border-radius: 28px;
          background: rgba(255, 250, 243, 0.72);
          border: 1px solid var(--border);
          box-shadow: 0 18px 40px rgba(60, 35, 16, 0.12);
        }
        #stage {
          min-height: calc(100vh - 36px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="viewer">
        <div class="hud">
          <div class="pill">VRoid Mobile Web App</div>
          <div class="pill" id="status">Loading...</div>
        </div>
        <div id="stage"></div>
      </section>
      <aside class="panel">
        <h1>VRoid Viewer</h1>
        <p>スマホでも見やすいように作ったシンプルなWebアプリです。</p>
        <div class="tips">
          <div class="tip">PC: マウスで回転、ホイールでズーム</div>
          <div class="tip">スマホ: 指で回転、ピンチでズーム</div>
          <div class="tip">同じWi-Fiならスマホのブラウザからも開けます</div>
        </div>
      </aside>
    </main>
    <script type="module" src="./viewer.js"></script>
  </body>
</html>
