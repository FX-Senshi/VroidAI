<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VRoid AI Chat</title>
    <style>
      :root {
        --bg: #efe5d5;
        --bg-2: #e6d6bf;
        --panel: rgba(255, 250, 243, 0.88);
        --panel-strong: rgba(255, 251, 246, 0.95);
        --border: rgba(98, 67, 39, 0.12);
        --text: #2f241b;
        --muted: #6e5a4b;
        --accent: #b35f31;
        --accent-2: #8e4720;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: "Yu Gothic", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.72), transparent 34%),
          linear-gradient(165deg, var(--bg) 0%, #f4ecdf 48%, var(--bg-2) 100%);
      }
      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: minmax(54vh, 1fr) auto;
      }
      .viewer {
        position: relative;
        overflow: hidden;
      }
      #stage {
        width: 100%;
        height: 100%;
        min-height: 54vh;
      }
      .hud {
        position: absolute;
        top: 14px;
        left: 14px;
        right: 14px;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .pill {
        padding: 9px 12px;
        border-radius: 999px;
        background: rgba(255, 251, 246, 0.92);
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.92rem;
      }
      .sidebar {
        margin: 0 14px 14px;
        display: grid;
        gap: 14px;
      }
      .panel {
        padding: 18px;
        border-radius: 22px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 18px 40px rgba(60, 35, 16, 0.12);
        backdrop-filter: blur(16px);
      }
      .intro h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 8vw, 3rem);
        line-height: 1;
      }
      .intro p,
      .hint,
      .metaLabel {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
      .metaRow {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }
      .field {
        display: grid;
        gap: 6px;
      }
      .field select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 252, 247, 0.96);
        color: var(--text);
        font: inherit;
      }
      .chat {
        display: grid;
        grid-template-rows: auto minmax(220px, 1fr) auto;
        min-height: 42vh;
      }
      .chatHeader {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      .chatHeader h2 {
        margin: 0;
        font-size: 1.15rem;
      }
      .messages {
        overflow: auto;
        display: grid;
        gap: 10px;
        padding-right: 4px;
      }
      .message {
        max-width: 92%;
        padding: 12px 14px;
        border-radius: 16px;
        line-height: 1.65;
        white-space: pre-wrap;
      }
      .message.user {
        margin-left: auto;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
      }
      .message.assistant {
        background: var(--panel-strong);
        border: 1px solid var(--border);
      }
      .composer {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }
      .composer textarea {
        width: 100%;
        min-height: 104px;
        resize: vertical;
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: rgba(255, 252, 247, 0.96);
        color: var(--text);
        font: inherit;
      }
      .composerRow {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }
      .sendButton {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        font: inherit;
        cursor: pointer;
      }
      .sendButton:disabled {
        opacity: 0.7;
        cursor: wait;
      }
      @media (min-width: 980px) {
        .app {
          grid-template-columns: minmax(460px, 1.15fr) minmax(360px, 0.85fr);
          grid-template-rows: 1fr;
          gap: 18px;
          padding: 18px;
        }
        .sidebar {
          margin: 0;
          align-content: stretch;
          grid-template-rows: auto 1fr;
        }
        .viewer {
          border-radius: 28px;
          background: rgba(255, 250, 243, 0.72);
          border: 1px solid var(--border);
          box-shadow: 0 18px 40px rgba(60, 35, 16, 0.12);
        }
        #stage {
          min-height: calc(100vh - 36px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="viewer">
        <div class="hud">
          <div class="pill">VRoid AI Chat</div>
          <div class="pill" id="status">Loading...</div>
        </div>
        <div id="stage"></div>
      </section>
      <aside class="sidebar">
        <section class="panel intro">
          <h1>VRoid AI Chat</h1>
          <p>Switch between your VRM models and chat with the character using your OpenAI API key.</p>
          <div class="metaRow">
            <div class="field">
              <label class="metaLabel" for="modelSelect">Character model</label>
              <select id="modelSelect"></select>
            </div>
            <div class="pill" id="apiState">Checking API...</div>
          </div>
        </section>
        <section class="panel chat">
          <div class="chatHeader">
            <h2>Chat</h2>
          </div>
          <div class="messages" id="messages"></div>
          <form class="composer" id="chatForm">
            <textarea id="chatInput" placeholder="Talk to the character"></textarea>
            <div class="composerRow">
              <p class="hint" id="chatHint">Press Enter to send. Use Shift+Enter for a new line.</p>
              <button class="sendButton" id="sendButton" type="submit">Send</button>
            </div>
          </form>
        </section>
      </aside>
    </main>
    <script type="module" src="./viewer.js"></script>
  </body>
</html>
